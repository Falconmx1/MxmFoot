# docker-compose.yml
version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: mxmfoot_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/mxmfoot2024
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
  
  web_panel:
    build: ./web_panel
    ports:
      - "5000:5000"
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=mxmfoot2024
